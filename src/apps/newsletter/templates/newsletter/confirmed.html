{% extends "base.html" %}
{% load i18n %}
{% block title %}Suscripción confirmada{% endblock %}
{% block content %}
<section class="mx-auto flex max-w-xl flex-col items-center px-4 py-24 text-center">
  <div class="mb-6 grid h-16 w-16 place-items-center rounded-2xl bg-steel-500/15 text-steel-500">
    <svg class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
  </div>
  <h1 class="font-display text-3xl font-extrabold text-ink-900 dark:text-white">¡Suscripción confirmada!</h1>
  <p class="mt-4 text-ink-500 dark:text-ink-400">Gracias por unirte. Recibirás los nuevos artículos en <span class="font-medium text-ink-700 dark:text-ink-200">{{ subscriber.email }}</span>.</p>
  <a href="/" class="btn-primary mt-8">{% translate "Volver al inicio" %}</a>
</section>
{% endblock %}
