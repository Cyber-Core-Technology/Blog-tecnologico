{% extends "base.html" %}
{% load wagtailcore_tags %}
{% block content %}
<article class="mx-auto max-w-3xl px-4 py-16">
  <h1 class="font-display text-4xl font-extrabold tracking-tight text-ink-900 dark:text-white">{{ page.title }}</h1>
  <hr class="rule-brand my-8">
  <div class="prose prose-lg prose-ink max-w-none dark:prose-invert prose-headings:font-display prose-a:text-steel-600 dark:prose-a:text-steel-400">{{ page.body|richtext }}</div>
</article>
{% endblock %}
