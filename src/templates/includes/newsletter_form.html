{% load i18n %}
<div id="newsletter-wrapper" class="mt-4">
  <form hx-post="{% url 'newsletter:subscribe' %}"
        hx-target="#newsletter-wrapper"
        hx-swap="innerHTML"
        class="flex flex-col gap-2.5 sm:flex-row">
    {% csrf_token %}
    <div class="hidden" aria-hidden="true">
      <input type="text" name="website" tabindex="-1" autocomplete="off">
    </div>
    <input type="email" name="email" required placeholder="{% translate 'tu@correo.com' %}" class="input flex-1">
    <button type="submit" class="btn-primary shrink-0">
      <span class="htmx-indicator-hide">{% translate "Suscribirme" %}</span>
      <span class="htmx-indicator items-center gap-2">
        <svg class="h-4 w-4 animate-spin" viewBox="0 0 24 24" fill="none"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.4 0 0 5.4 0 12h4z"/></svg>
        Enviando…
      </span>
    </button>
  </form>
</div>
