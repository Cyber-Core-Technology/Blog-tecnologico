{# Bloque de código con ventana, lenguaje y botón de copiar (JS propio). #}
<figure data-code-block class="not-prose my-7 overflow-hidden rounded-xl border border-ink-800 bg-ink-900 shadow-lg shadow-ink-950/30 dark:border-ink-700">
  <figcaption class="flex items-center gap-2 border-b border-ink-800 bg-ink-850 px-4 py-2.5 dark:border-ink-700">
    <span class="flex gap-1.5">
      <span class="h-3 w-3 rounded-full bg-maroon-600/80"></span>
      <span class="h-3 w-3 rounded-full bg-ink-400/60"></span>
      <span class="h-3 w-3 rounded-full bg-steel-500/80"></span>
    </span>
    <span class="ml-2 truncate font-mono text-xs text-ink-300">{{ value.caption|default:value.language }}</span>
    <span class="ml-auto font-mono text-[10px] uppercase tracking-widest text-ink-500">{{ value.language }}</span>
    <button data-copy type="button" class="ml-2 inline-flex items-center gap-1 rounded-md px-2 py-1 text-xs text-ink-400 transition hover:bg-ink-700/60 hover:text-paper">
      <span data-copy-idle class="inline-flex items-center gap-1">
        <svg class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
        Copiar
      </span>
      <span data-copy-done class="hidden items-center gap-1 text-steel-400">
        <svg class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
        Copiado
      </span>
    </button>
  </figcaption>
  <div data-code>{{ highlighted }}</div>
</figure>
