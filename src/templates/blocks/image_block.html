{% load wagtailimages_tags %}
<figure class="not-prose my-8">
  {% image value.image width-1280 as img %}
  <img src="{{ img.url }}" width="{{ img.width }}" height="{{ img.height }}"
       alt="{{ value.alt_text|default:value.caption }}" loading="lazy"
       class="mx-auto rounded-2xl ring-1 ring-ink-200/60 dark:ring-ink-800">
  {% if value.caption %}
    <figcaption class="mt-3 text-center text-sm text-ink-400">{{ value.caption }}</figcaption>
  {% endif %}
</figure>
